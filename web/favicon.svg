<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Trophy Cup -->
  <g fill="#FFD700" stroke="#FFA500" stroke-width="2">
    <!-- Left handle -->
    <path d="M 20 30 Q 10 30 10 45 Q 10 55 20 55" fill="none" stroke-width="3"/>
    
    <!-- Cup body -->
    <path d="M 20 30 L 25 70 Q 25 80 35 82 L 65 82 Q 75 80 75 70 L 80 30 Z" fill="#FFD700"/>
    
    <!-- Right handle -->
    <path d="M 80 30 Q 90 30 90 45 Q 90 55 80 55" fill="none" stroke-width="3"/>
    
    <!-- Cup rim -->
    <ellipse cx="50" cy="30" rx="30" ry="6" fill="none" stroke-width="2"/>
    
    <!-- Base -->
    <rect x="40" y="82" width="20" height="8" fill="#FFD700" stroke="#FFA500" stroke-width="2"/>
    <rect x="35" y="90" width="30" height="4" fill="#FFA500"/>
  </g>
  
  <!-- Star on cup -->
  <g fill="#FFA500">
    <path d="M 50 45 L 52 52 L 59 52 L 53 57 L 55 64 L 50 59 L 45 64 L 47 57 L 41 52 L 48 52 Z"/>
  </g>
</svg>